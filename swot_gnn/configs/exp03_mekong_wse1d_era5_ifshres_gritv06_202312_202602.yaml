# Experiment 01: 1-day-ahead lake WSE forecasting
#
# Task:   Given 30 days of ERA5 reanalysis + SWOT WSE history and the ECMWF
#         IFS forecast for the next day, predict the next-day Water Surface
#         Elevation (WSE) for every lake node in the Mekong reservoir graph.
#
# Input:  (n_lakes, 31, 21)
#   Timesteps  0-29 : historical ERA5 + SWOT (seq_len=30)
#              feat  0-7 : SWOT WSE block (obs_mask, latest_wse, latest_wse_u,
#                          latest_wse_std, latest_area_total, days_since_last_obs,
#                          doy_sin, doy_cos)
#              feat  8-20: ERA5-Land climate (LWd, SWd, P, Pres, Temp, Td,
#                          Wind, sf, sd, swvl1, swvl2, swvl3, swvl4)
#   Timestep  30    : ECMWF IFS next-day forecast (forecast_horizon=1)
#              feat  0-5 : zeroed (no SWOT observation at forecast time)
#              feat  6-7 : doy_sin/cos for the forecast date
#              feat  8-20: 13 ECMWF climate variables (same order as ERA5)
#
# Output: (n_lakes,) — normalised next-day WSE per lake
#
# Loss:   ObservedMSELoss — MSE averaged only over lakes with a SWOT observation
#         on the forecast date (label_mask=1).
#
model:
  swot_dim: 8              # obs_mask, latest_wse, latest_wse_u, latest_wse_std,
                            # latest_area_total, days_since_last_obs, doy_sin, doy_cos
  climate_dim: 13          # LWd, SWd, P, Pres, Temp, Td, Wind, sf, sd, swvl1-4
  static_embed_dim: 16
  embed_dim: 64
  hidden_dim: 64
  st_blocks: 1
  gps_layers_per_block: 2
  gps_heads: 4
  dropout: 0.1
  forecast_horizon: 1      # 1-day-ahead (single scalar output per lake)

training:
  seq_len: 30              # ERA5/SWOT history window (days before init_date)
  forecast_horizon: 1      # ECMWF lead days used as input / days predicted
  total_seq_len: 31        # seq_len + forecast_horizon (informational)
  train_frac: 0.70
  val_frac: 0.15
  test_frac: 0.15
  batch_size: 16
  lr: 0.001
  num_epochs: 100
  patience: 20             # early-stop if val loss does not improve for 20 epochs
  grad_clip: 1.0
